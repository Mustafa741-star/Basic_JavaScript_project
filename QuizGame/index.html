<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz game</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <!-- The first screen -->
        <div class="screen active " id="start-screen">
            <h1>Quiz Time!</h1>
            <p>Test your knowledge with these fun questions</p>
            <button id="start-btn">Start Quiz</button>
        </div>
        <!-- This screen will appear after clicking on Start Quiz  -->
        <div class="screen " id="quiz-screen">
            <div class="quiz-header">
                <h2 id="question-text">Question goes here</h2>
                <div class="quiz-info">
                    <p>
                        Question <span id="current-question">1</span> of
                        <span id="total-questions"></span>
                    </p>

                    <p>
                        Score: <span id="score">0</span>
                    </p>
                </div>
            </div>

            <div id="answers-container" class="answers-container">
                <!-- Answer buttons will be instered here from our js code later at some point -->
            </div>

            <div class="progress-bar">
                <div id="progress" class="progress"></div>
            </div>
        </div>

        <div id="result-screen" class="screen">
            <h1>Quix Results</h1>
            <div class="result-info">
                <p>You scored <spna id="final-score"></spna> <span>out of</span> <span id="max-score"></span></p>
                <div id="result-message">Good job!</div>
            </div>

            <button id="restart-btn">Restart Quiz</button>
        </div>
    </div>
</body>
<script src="script..js"></script>

</html>
